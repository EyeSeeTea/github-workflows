name: "Master Workflow"

on:
  workflow_call:
    inputs:
      languages:
        description: "Languages to analyze"
        required: false
        default: '["javascript-typescript"]'
        type: string
      build_mode:
        description: "Build mode for CodeQL analysis"
        required: false
        default: "none"
        type: string
      bundlemonrc_branch_name:
        description: "Branch where to fetch bunlemonrc" # couldn't find a way to get the workflow branch from caller. Need to pass for testing
        required: false
        default: "master"
        type: string
      runner:
        description: "Specify runner. Defaults to checking visibility"
        required: false
        type: string
      bom_runner:
        description: "Specify runner for BOM workflows"
        required: false
        default: "dependency-track-runner"
        type: string
      workflows_to_run:
        description: 'Comma-separated list of workflows to run (e.g., flow1,flow2)'
        required: false
        default: 'all' #'run-tests,codeql-scan,build-check'
        type: string
    secrets:
      DTRACK_API_KEY:
        required: false

jobs:
  detect-pm:
    if: contains(inputs.workflows_to_run, 'dependency-track-syft') || contains(inputs.workflows_to_run, 'all')
    runs-on: ${{ inputs.runner || 'general-runner' }}
    outputs:
      use_yarn4: ${{ steps.check.outputs.use_yarn4 }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if grep -q '"packageManager": "yarn@4' package.json 2>/dev/null; then
            echo "use_yarn4=true" >> $GITHUB_OUTPUT
          else
            echo "use_yarn4=false" >> $GITHUB_OUTPUT
          fi

  run-tests:
    if: contains(inputs.workflows_to_run, 'run-tests') || contains(inputs.workflows_to_run, 'all')
    uses: ./.github/workflows/app-test.yml
    with:
      runner: ${{ inputs.runner || 'general-runner' }}

  #skip if private repo
  codeql-scan:
    if: contains(inputs.workflows_to_run, 'codeql-scan') || contains(inputs.workflows_to_run, 'all') && github.event.repository.private == false
    uses: ./.github/workflows/codeql.yml
    with:
      languages: ${{ inputs.languages }}
      build_mode: ${{ inputs.build_mode }}
      runner: ${{ inputs.runner || 'general-runner' }}

  build-check:
    if: contains(inputs.workflows_to_run, 'build-check') || contains(inputs.workflows_to_run, 'all')
    uses: ./.github/workflows/bundlemon-build-size.yml
    with:
      branch_name: ${{ inputs.bundlemonrc_branch_name }}
      runner: ${{ inputs.runner || 'general-runner' }}

  dependency-track-yarn4:
    if: contains(inputs.workflows_to_run, 'dependency-track-yarn4') || contains(inputs.workflows_to_run, 'all')
    uses: ./.github/workflows/dependency-track-yarn4.yml
    secrets:
      DTRACK_API_KEY: ${{ secrets.DTRACK_API_KEY }}
    with:
      runner: ${{ inputs.bom_runner }}

  dependency-track-syft:
    needs: detect-pm
    if: needs.detect-pm.outputs.use_yarn4 == 'false' && (contains(inputs.workflows_to_run, 'dependency-track-syft') || contains(inputs.workflows_to_run, 'all'))
    uses: ./.github/workflows/dependency-track-syft.yml
    secrets:
      DTRACK_API_KEY: ${{ secrets.DTRACK_API_KEY }}
    with:
      runner: ${{ inputs.bom_runner }}
